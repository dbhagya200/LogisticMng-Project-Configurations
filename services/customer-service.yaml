spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/logistic
    username: postgres
    password: psql
    driver-class-name: org.postgresql.Driver

#  datasource:
#    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/logistic
#    username: ${DB_USERNAME:postgres}
#    password: ${DB_PASSWORD:psql}
#    driver-class-name: org.postgresql.Driver
