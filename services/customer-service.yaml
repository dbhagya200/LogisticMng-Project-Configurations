servlet:
  multipart:
    enabled: true
    max-file-size: 5MB
    max-request-size: 10MB

server:
  port: 0
  forward-headers-strategy: framework

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}

app:
  storage:
    path: ${user.home}/.ijse/eca/customer